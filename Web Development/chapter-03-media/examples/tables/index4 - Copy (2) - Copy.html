<!DOCTYPE html>
<title>
Input a value, spit it out. 
</title>

<script>
function myFunction() {
document.getElementById("demo").innerHTML = document.getElementById("myText").value;
}

</script>


<html>
<body>

<input type="text" id="myText">

<p></p>

<button onclick="myFunction()">Try it</button>

<p id="demo"></p>

</body>
</html>
