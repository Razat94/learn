<!DOCTYPE html>
<html>
	
	<style>

	html, body {
		margin: 0;
		padding: 0;
		background-color: #e6f2ff;
	}

	#header {
		width: 100%;
		border-collapse: collapse;
		height: 50px;
		border-bottom: 1px solid #02487e;
		background-color: #e6f2ff;
	}
	
	#header th:first-child, th:last-child {
		width: 15%;
		padding: 0;
	}
	
	#header button, table form {
		margin: 0;
		border: none;
		width: 100%;
		height: 100%;
		outline: none;
		padding: 0;
		background-color: #e6f2ff; //#e6e6f2;
	}
	
	#header th:first-child button, #header th:last-child button  {
		font-size: 20px;
		color: #025697;
		cursor: pointer;
		padding-top: 10%;
	}
	
	#header th:first-child button:hover, #header th:last-child button:hover  {
		color: #e6e6dd;
	}
	
	#header th:nth-child(2) {
		font-size: 60px;
		color: #02487e;
		
	}
	
	</style>

	<body>
	
		<table id = "header">
			<tr>
				<th>
					<form action = "">
						<button> <strong>Projects</strong> </button>
					</form>
				</th>
				
				<th> Raza Tahir </th> 
				<th>
					<button> <strong>About Me</strong> </button>
				</th>
			</tr>
		</table>
	
	</body>
	
</html>
