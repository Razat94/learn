<!DOCTYPE html>
<html>
<head>
<title>Contact Form Submission</title>
</head>
<body>

<h1>Contact Us</h1>

<form action="https://example.com/contact" method="POST">
  <label>Name:</label>
  <input type="text" name="name">

  <label>Email:</label>
  <input type="email" name="email">

  <label>Message:</label>
  <textarea name="message"></textarea>

  <button type="submit">Send</button>
</form>

</body>
</html>
